<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Superhero Card</title>
    <style>
        body {

background-color: darkblue;

color: white;

font-family: Arial, sans-serif;
}
.hero-name {

font-size: 60px;

font-weight: bold;

color: yellow;

text-shadow: 3px 3px orange;

}
.hero-name {

font-size: 60px;

font-weight: bold;

color: yellow;

text-shadow: 3px 3px orange;
}
.tagline {
    text-shadow: 1px 1px yellow;

font-style: italic;

color: lightblue;

text-transform: capitalize;

}.label {

text-transform: uppercase;

text-decoration: underline;

color: coral;

}.power {
 text-decoration: underline;

font-weight: bold;

color: lightgreen;

}.weakness {

text-decoration: line-through;

color: gray;

}.badge {

font-size: 28px;

font-weight: bold;

color: gold;

transform: rotate(15deg);

}.made-by {

color: coral;

font-style: italic;

}









    </style>

</head>

<body>

    <h1 class="hero-name">Thunder Kid</h1>

    <p class="tagline">the most powerful hero in the school</p>

    <h2 class="label">super powers</h2>

    <p class="power">Can run faster than a cheetah</p>

    <p class="power">Can lift a school bus</p>

    <h2 class="label">weaknesses</h2>

    <p class="weakness">Maths homework</p>

    <p class="weakness">Broccoli</p>

    <p class="badge">Top Hero</p>

    <p class="made-by">Created by Rudraansh </p>

</body>

</html>
