<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Colour Card</title>
    <style>
        * {
            font-size: 16px;
        }

        body {
            background-color: bisque
        }

        h1 {
            color: brown
        }

        h2 {
            color: blueviolet
        }

        p {
            color: dimgray
        }

        .my-detail {
            color: darkgreen;
            font-weight: bold;
        }
        #my-card{background-color:orange}
    </style>
</head>

<body>

    <h1>My Colour Card</h1>

    <!-- Inside the line only CSS: Add style="color: ____;" inside this p tag -->

    <p style="color: crimson;">Hi! This is my very own webpage.</p>

    <div id="my-card">

        <h2>About Me</h2>

        <p class="my-detail">My name is Sam.</p>

        <p class="my-detail">My favourite colour is red.</p>

        <p class="my-detail">My favourite subject is Maths.</p>

        <p class="my-detail">My favourite food is pasta.</p>

    </div>

    <h2>My Favourite Things</h2>

    <p class="my-detail">My favourite animal is a cat.</p>

    <p>My favourite sport is cricket.</p>

    <p style="color:purple">My favourite movie is The Lion King.</p>

</body>

</html>
